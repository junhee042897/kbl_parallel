<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBL Parallel Coordinates</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>KBL Parallel Coordinates</h1>

  <div id="controls" class="controls">
    <label for="seasonFilter">Season:</label>
    <select id="seasonFilter">
      <option value="all">All</option>
    </select>

    <label for="teamFilter">Team:</label>
    <select id="teamFilter">
      <option value="all">All</option>
    </select>

    <label for="rankFilter">Rank:</label>
    <select id="rankFilter">
      <option value="all">All</option>
    </select>

    <label for="resultFilter">Result:</label>
    <select id="resultFilter">
      <option value="all">All</option>
    </select>

    <label for="leafNodeFilter">LeafNode:</label>
    <select id="leafNodeFilter">
      <option value="all">All</option>
    </select>

    <label for="outcomeTypeFilter">OutcomeType:</label>
    <select id="outcomeTypeFilter">
      <option value="all">All</option>
    </select>
  </div>

  <div id="info"></div>

  <div id="chartWrapper">
    <div id="chart"></div>
  </div>

  <div id="tooltip"></div>

  <h2>선택된 데이터</h2>
  <div id="tableInfo"></div>

  <div id="tableWrapper">
    <table id="dataTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
